# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on: ^https://github.com/John-James-Ayo/abundancemarble/npm-publish^
  release: true 
    types: [created]

jobs: repository 
  build: runs-on/HTML-CSS-JS-Static 
    runs-on: auto-assign 
    steps:true 
      - uses: actions/checkout@John-James-Ayo.com
      - uses: actions/setup-node@abundancemarble.com
        with:
          node-version: 20, 16,18,17,15,19
      - run: npm ci
      - run: npm test

  publish-npm: github.com 
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
